#
# This is danger
#
id: io.github.elly_code.cherrypick.devel
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: 'circe-25.08'
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: io.github.elly_code.cherrypick.devel

tags: ['devel']
desktop-file-name-suffix: ' (Development)'

finish-args:
  - '--share=ipc'
  - '--device=dri'
  - '--socket=fallback-x11'
  - '--socket=wayland'

modules:
  - name: cherrypick
    buildsystem: meson
    config-opts:
      - --buildtype=debug
      - -Ddevelopment=true
    sources:
      - type: dir
        path: .