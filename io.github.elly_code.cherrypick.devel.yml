#
# This is danger
#
id: io.github.elly_code.cherrypick.devel
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: 'circe-25.08'
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: io.github.elly_code.cherrypick.devel

tags: ['devel']
desktop-file-name-suffix: ' (Development)'

finish-args:
  - '--share=ipc'
  - '--device=dri'
  - '--socket=fallback-x11'
  - '--socket=wayland'

cleanup-commands:
  - rm -rf /app/bin/sassc
  - rm -rf /app/include
  - rm -rf /app/lib/girepository-1.0
  - rm -rf /app/lib/pkgconfig
  - rm -rf /app/share/gir-1.0
  - rm -rf /app/share/vala
  - rm -rf /app/lib/libgee*
  - rm -rf /app/lib/libsass*

modules:
  - name: cherrypick
    buildsystem: meson
    config-opts:
      - -Ddevelopment=true
    sources:
      - type: dir
        path: .