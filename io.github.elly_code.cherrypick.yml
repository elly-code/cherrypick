id: io.github.elly_code.cherrypick
runtime: io.elementary.Platform
runtime-version: '8.2'
sdk: io.elementary.Sdk
command: io.github.elly_code.cherrypick

finish-args:
  - '--share=ipc'
  - '--device=dri'
  - '--socket=fallback-x11'
  - '--socket=wayland'

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

modules:
  - name: cherrypick
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .