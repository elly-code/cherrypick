id: io.github.elly_code.cherrypick
runtime: io.elementary.Platform
runtime-version: '8.2'
sdk: io.elementary.Sdk
command: io.github.elly_code.cherrypick

finish-args:
  - '--share=ipc'
  - '--device=dri'
  - '--socket=fallback-x11'
  - '--socket=wayland'

cleanup-commands:
  - rm -rf /app/bin/sassc
  - rm -rf /app/include
  - rm -rf /app/lib/girepository-1.0
  - rm -rf /app/lib/pkgconfig
  - rm -rf /app/share/gir-1.0
  - rm -rf /app/share/vala
  - rm -rf /app/lib/libgee*
  - rm -rf /app/lib/libsass*

modules:
  - name: cherrypick
    buildsystem: meson
    sources:
      - type: dir
        path: .