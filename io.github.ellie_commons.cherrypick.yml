id: io.github.ellie_commons.cherrypick
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: 'circe-25.08'
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: io.github.ellie_commons.cherrypick

finish-args:
  - '--share=ipc'
  - '--device=dri'
  - '--socket=fallback-x11'
  - '--socket=wayland'

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

# Cleanup development-related files inherited from the BaseApp to reduce package size of your app.
cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: cherrypick
    buildsystem: meson
    config-opts:
      - -Dlegacy-rdnn=true
    sources:
      - type: git
        url: https://github.com/elly-code/cherrypick.git
        tag: 2.4.0
        commit: 0ed67bc0bc0b3af51b2a2a796c46ef79cfec30e2
        x-checker-data:
          type: git
          tag-pattern: '^([\d.]+)$'